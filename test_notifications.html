<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Notification System</h1>

        <div class="bg-white rounded-xl p-6 shadow-md space-y-4">
            <h2 class="text-xl font-semibold mb-4">Toast Notifications</h2>
            <button onclick="window.toast.success('Berhasil menyimpan data!')"
                class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                Success Toast
            </button>
            <button onclick="window.toast.error('Terjadi kesalahan!')"
                class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                Error Toast
            </button>
            <button onclick="window.toast.warning('Perhatian!')"
                class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600">
                Warning Toast
            </button>
            <button onclick="window.toast.info('Informasi penting')"
                class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                Info Toast
            </button>

            <hr class="my-6">

            <h2 class="text-xl font-semibold mb-4">Loading Overlay</h2>
            <button onclick="showLoading()" class="px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600">
                Show Loading (3 seconds)
            </button>
        </div>
    </div>

    <script src="public/js/notifications.js"></script>
    <script>
        function showLoading() {
            window.loading.show('Memproses data...');
            setTimeout(() => {
                window.loading.hide();
                window.toast.success('Selesai!');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            lucide.createIcons();
        });
    </script>
</body>

</html>
